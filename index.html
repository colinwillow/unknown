<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Test</title>
</head>
<body style="background:black; color:white; font-family:sans-serif; padding:20px;">
  <h2>VERSION 2 — Cloudinary Test</h2>
  <p>If you see an image below, Cloudinary is working:</p>
  <img 
    src="https://res.cloudinary.com/dqomyog3u/image/upload/78E667E7-AB08-4B77-AEE6-B6176DD7AC34" 
    style="width:100%; max-width:400px; display:block; margin-top:20px;"
    onerror="this.style.border='3px solid red'; document.getElementById('status').innerText='FAILED - image did not load'"
    onload="document.getElementById('status').innerText='SUCCESS - Cloudinary is working!'"
  >
  <p id="status" style="margin-top:20px; font-size:20px; color:yellow;">Loading...</p>
</body>
</html>
